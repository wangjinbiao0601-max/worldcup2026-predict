<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function() {
  var odds = getCachedOdds();
  var top20 = odds.slice(0, 20);
  function tn(t) { return (typeof I18N!=='undefined'&&I18N.current==='en') ? (t.nameEn||t.name) : t.name; }

  // Render table (always works)
  function renderTable() {
    var html = '<thead><tr><th>#</th><th>Team</th><th>FIFA</th><th>Group</th><th>Probability</th></tr></thead><tbody>';
    top20.forEach(function(t, i) {
      var rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
      html += '<tr><td><span class="rank-badge '+rc+'">'+(i+1)+'</span></td><td>'+tn(t)+'</td><td>#'+t.fifaRank+'</td><td>'+t.group+'</td><td><b>'+t.probability+'%</b></td></tr>';
    });
    html += '</tbody>';
    document.getElementById('champ-table').innerHTML = html;
  }

  // Render chart (needs Chart.js)
  function renderChart() {
    var canvas = document.getElementById('champChart');
    if (!canvas || typeof Chart === 'undefined') return false;
    if (Chart.getChart(canvas)) Chart.getChart(canvas).destroy();
    var labels = top20.map(function(t) { return tn(t); });
    var data = top20.map(function(t) { return t.probability; });
    var bgColors = top20.map(function(_, i) {
      return i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#d97706':'#3b82f6';
    });
    var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    new Chart(canvas, {
      type: 'bar', data: { labels: labels, datasets: [{ label: 'Win %', data: data, backgroundColor: bgColors, borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { callback: function(v) { return v+'%'; }, color: isDark?'#94a3b8':'#6c757d' }, grid: { color: isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)' } },
          y: { ticks: { color: isDark?'#94a3b8':'#6c757d' }, grid: { display: false } }
        }
      }
    });
    return true;
  }

  // Try chart first, fall back to table
  if (!renderChart()) { document.getElementById('champChart').parentElement.style.display = 'none'; }
  renderTable();

  // ===== 比赛胜率计算器 (simplified) =====
  function renderMatchup() {
    var teams = TEAMS.slice().sort(function(a,b){ return a.fifaRank-b.fifaRank; });
    var html = '<select id="teamA" onchange="calcMatchup()"><option value="">'+(typeof L!=='undefined'?L('选择球队A'):'选择球队A')+'</option>';
    teams.forEach(function(t){ html+='<option value="'+t.fifaCode+'">'+t.nameCN+'</option>'; });
    html += '</select> <span style="margin:0 8px;font-weight:700;">VS</span> <select id="teamB" onchange="calcMatchup()"><option value="">'+(typeof L!=='undefined'?L('选择球队B'):'选择球队B')+'</option>';
    teams.forEach(function(t){ html+='<option value="'+t.fifaCode+'">'+t.nameCN+'</option>'; });
    html += '</select>';
    document.getElementById('matchup-selector').innerHTML = html;
  }

  window.calcMatchup = function() {
    var ca = document.getElementById('teamA').value;
    var cb = document.getElementById('teamB').value;
    if (!ca || !cb) return;
    var a = getTeamByCode(ca), b = getTeamByCode(cb);
    var p = calcMatchProbability(a, b);
    document.getElementById('team-a-display').innerHTML = '<img src="'+a.flag+'" alt="" style="width:48px;height:36px;"><div class="compare-team-name">'+a.nameCN+'</div>';
    document.getElementById('team-b-display').innerHTML = '<img src="'+b.flag+'" alt="" style="width:48px;height:36px;"><div class="compare-team-name">'+b.nameCN+'</div>';
    document.getElementById('matchup-bars').innerHTML =
      '<div style="margin:8px 0;"><span style="font-weight:600;">'+a.nameCN+':</span> <div class="prob-bar-bg"><div class="prob-bar" style="width:'+p.homeWin+'%;background:var(--accent);height:20px;"></div></div> <span style="font-weight:700;color:var(--accent);">'+p.homeWin+'%</span></div>'+
      '<div style="margin:8px 0;"><span style="font-weight:600;">Draw:</span> <div class="prob-bar-bg"><div class="prob-bar" style="width:'+p.draw+'%;background:var(--text-tertiary);height:20px;"></div></div> <span style="font-weight:700;">'+p.draw+'%</span></div>'+
      '<div style="margin:8px 0;"><span style="font-weight:600;">'+b.nameCN+':</span> <div class="prob-bar-bg"><div class="prob-bar" style="width:'+p.awayWin+'%;background:var(--danger);height:20px;"></div></div> <span style="font-weight:700;color:var(--danger);">'+p.awayWin+'%</span></div>';
  };

  renderMatchup();

  // ===== 小组出线概率 =====
  function renderGroupQual() {
    var groups = getAllGroups();
    var tabsHTML = groups.map(function(g){ return '<span class="group-tab'+(g===groups[0]?' active':'')+'" onclick="showQualGroup(\''+g+'\')">'+g+'</span>'; }).join('');
    document.getElementById('qual-group-tabs').innerHTML = tabsHTML;
    showQualGroup(groups[0]);
  }

  window.showQualGroup = function(group) {
    var tabs = document.querySelectorAll('#qual-group-tabs .group-tab');
    tabs.forEach(function(t){ t.classList.toggle('active', t.textContent === group); });
    var qp = calcGroupQualification(group);
    var html = '<table class="data-table"><thead><tr><th>#</th><th>Team</th><th>FIFA</th><th>Qualify %</th></tr></thead><tbody>';
    qp.forEach(function(t,i){
      html += '<tr><td>'+(i+1)+'</td><td><img src="'+t.flag+'" style="width:24px;height:18px;vertical-align:middle;margin-right:6px;">'+t.name+'</td><td>#'+t.fifaRank+'</td><td><b>'+t.qualifyProb+'%</b></td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('qual-group-result').innerHTML = html;
  };

  renderGroupQual();

  window.renderLang = function() { renderMatchup(); };
})();
</script>
