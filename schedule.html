  <h1 class="section-title" data-i18n="赛程中心">赛程中心</h1>
  <p class="section-desc" data-i18n="共104场比赛 · 72场小组赛 + 32场淘汰赛 · 时间均为北京时间">共104场比赛 · 72场小组赛 + 32场淘汰赛 · 时间均为北京时间</p>

<script src="js/probability.js"></script>
<script>
(function() {
  function L(text) { return typeof I18N !== 'undefined' ? I18N.t(text) : text; }
  var currentStage = 'all';
  var currentGroup = 'all';

  function renderFilters() {
    var stages = [
      { id: 'all', label: L('全部比赛') },
      { id: 'group', label: L('小组赛') },
      { id: 'round32', label: L('32强') },
      { id: 'round16', label: L('16强') },
      { id: 'quarter', label: L('8强') },
      { id: 'semi', label: L('半决赛') },
      { id: 'thirdPlace', label: L('季军赛') },
      { id: 'final', label: L('决赛') },
    ];
    var filtersHTML = stages.map(function(s) {
      return '<span class="stage-filter' + (s.id === currentStage ? ' active' : '') + '" data-stage="' + s.id + '">' + s.label + '</span>';
    }).join('');
    document.getElementById('stage-filters').innerHTML = filtersHTML;
  }

  document.getElementById('stage-filters').addEventListener('click', function(e) {
    if (e.target.classList.contains('stage-filter')) {
      document.querySelectorAll('.stage-filter').forEach(function(f) { f.classList.remove('active'); });
      e.target.classList.add('active');
      currentStage = e.target.dataset.stage;
      currentGroup = 'all';
      toggleGroupFilter();
      renderMatches();
    }
  });

  function toggleGroupFilter() {
    var row = document.getElementById('group-filter-row');
    if (currentStage === 'group' || currentStage === 'all') row.classList.remove('hidden');
    else row.classList.add('hidden');
  }

  function renderGroupTabs() {
    var groupRow = document.getElementById('group-filter-row');
    groupRow.innerHTML = '<span class="group-tab active" data-group="all">' + L('全部小组') + '</span>';
    getAllGroups().forEach(function(g) {
      var span = document.createElement('span');
      span.className = 'group-tab';
      span.dataset.group = g;
      span.textContent = g + L('组');
      groupRow.appendChild(span);
    });
  }
  renderGroupTabs();

  document.getElementById('group-filter-row').addEventListener('click', function(e) {
    if (e.target.classList.contains('group-tab')) {
      document.querySelectorAll('#group-filter-row .group-tab').forEach(function(t) { t.classList.remove('active'); });
      e.target.classList.add('active');
      currentGroup = e.target.dataset.group;
      renderMatches();
    }
  });

  var weekdaysZH = ['日','一','二','三','四','五','六'];
  var weekdaysEN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function renderMatches() {
    var matches = MATCHES;
    if (currentStage !== 'all') matches = matches.filter(function(m) { return m.stage === currentStage; });
    if (currentGroup !== 'all' && (currentStage === 'group' || currentStage === 'all')) matches = matches.filter(function(m) { return m.group === currentGroup; });

    var groupWord = L('组');
    var matchWord = L('场比赛');
    var tbd = L('待定');
    var mdWord = L('第');
    var roundWord = L('轮');
    document.getElementById('match-count').textContent = L('共') + ' ' + matches.length + ' ' + matchWord;

    var dates = {};
    matches.forEach(function(m) {
      if (!dates[m.date]) dates[m.date] = [];
      dates[m.date].push(m);
    });

    var isEn = I18N && I18N.current === 'en';
    var wdays = isEn ? weekdaysEN : weekdaysZH;

    var dateKeys = Object.keys(dates).sort();
    var html = '';
    dateKeys.forEach(function(date) {
      html += '<div class="match-date-header">' + date + ' (' + wdays[new Date(date + 'T00:00:00+08:00').getDay()] + ')</div>';

      dates[date].forEach(function(m) {
        var h = getTeamByCode(m.home);
        var a = getTeamByCode(m.away);
        var stageLabels = {
          group: m.group + groupWord + ' ' + mdWord + m.matchday + ' ' + roundWord,
          round32: L('32强'), round16: L('16强'), quarter: L('8强'),
          semi: L('半决赛'), thirdPlace: L('季军赛'), final: L('决赛')
        };
        var stageLabel = stageLabels[m.stage] || m.stage;

        var homeHTML = h ? '<div class="match-team"><img src="' + h.flag + '" alt=""><span class="match-team-name">' + h.nameCN + '</span></div>'
          : '<div class="match-team"><span class="match-team-name" style="color:var(--text-tertiary);">' + tbd + '</span></div>';
        var awayHTML = a ? '<div class="match-team right"><span class="match-team-name">' + a.nameCN + '</span><img src="' + a.flag + '" alt=""></div>'
          : '<div class="match-team right"><span class="match-team-name" style="color:var(--text-tertiary);">' + tbd + '</span></div>';
        var scoreHTML = m.score ? '<div class="match-score">' + m.score + '</div>' : '<div class="match-score scheduled">VS</div>';
        var probHTML = '';
        if (h && a) {
          var probs = calcMatchProbability(h, a);
          probHTML = '<div style="text-align:center;font-size:12px;min-width:90px;"><span style="color:var(--accent);">' + probs.homeWin + '%</span> · <span style="color:var(--text-tertiary);">' + probs.draw + '%</span> · <span style="color:var(--danger);">' + probs.awayWin + '%</span></div>';
        } else { probHTML = '<div style="min-width:90px;"></div>'; }

        html += '<div class="match-card">' +
          '<div class="match-time"><div class="match-date">' + m.date.slice(5) + '</div><div class="match-hour">' + m.time + '</div></div>' +
          '<div class="match-teams">' + homeHTML + '<span class="match-vs">VS</span>' + awayHTML + '</div>' +
          scoreHTML + '<span class="match-stage">' + stageLabel + '</span>' + probHTML +
          '<div class="match-venue">' + m.city + '</div></div>';
      });
    });
    document.getElementById('match-list').innerHTML = html;
  }

  var params = new URLSearchParams(window.location.search);
  var teamCode = params.get('team');
  if (teamCode) {
    var team = getTeamByCode(teamCode);
    if (team) {
      document.querySelector('.section-desc').textContent = team.nameCN + ' (' + team.fifaCode + ') ' + L('的赛程');
      var teamMatches = MATCHES.filter(function(m) { return m.home === teamCode || m.away === teamCode; });
      document.getElementById('match-count').textContent = L('共') + ' ' + teamMatches.length + ' ' + L('场比赛');
      var groupWord = L('组');
      var tbd = L('待定');
      var dates = {};
      teamMatches.forEach(function(m) { if (!dates[m.date]) dates[m.date] = []; dates[m.date].push(m); });
      var html = '';
      Object.keys(dates).sort().forEach(function(date) {
        html += '<div class="match-date-header">' + date + '</div>';
        dates[date].forEach(function(m) {
          var h = getTeamByCode(m.home); var a = getTeamByCode(m.away);
          var labels = {group: m.group+groupWord+' M'+m.matchday, round32: L('32强'), round16: L('16强'), quarter: L('8强'), semi: L('半决赛'), thirdPlace: L('季军赛'), final: L('决赛')};
          html += '<div class="match-card"><div class="match-time"><div class="match-date">' + m.date.slice(5) + '</div><div class="match-hour">' + m.time + '</div></div>' +
            '<div class="match-teams"><div class="match-team"><img src="' + (h?h.flag:'') + '" alt=""><span class="match-team-name">' + (h?h.nameCN:tbd) + '</span></div>' +
            '<span class="match-vs">VS</span><div class="match-team right"><span class="match-team-name">' + (a?a.nameCN:tbd) + '</span><img src="' + (a?a.flag:'') + '" alt=""></div></div>' +
            '<span class="match-stage">' + (labels[m.stage]||m.stage) + '</span><div class="match-venue">' + m.city + '</div></div>';
        });
      });
      document.getElementById('match-list').innerHTML = html;
      return;
    }
  }

  renderFilters();
  renderMatches();

  window.renderLang = function() {
    renderFilters();
    renderGroupTabs();
    renderMatches();
  };
})();
</script>
</body>
